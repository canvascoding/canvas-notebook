# Canvas Notebook - Nginx Reverse Proxy Configuration
# Domain: chat.canvasstudios.store
# App Port: 3000

# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=canvas_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=canvas_api:10m rate=60r/m;

# Upstream Definition
upstream canvas_app {
    server localhost:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP Server (Redirect to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name chat.canvasstudios.store;

    # Let's Encrypt ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.canvasstudios.store;

    # SSL Certificates (Let's Encrypt)
    # Uncomment when certificates are installed
    # ssl_certificate /etc/letsencrypt/live/chat.canvasstudios.store/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chat.canvasstudios.store/privkey.pem;

    # For now: use Cloudflare Full mode (self-signed cert or no cert)
    # Cloudflare handles SSL termination at edge

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Client Body Size (File Uploads)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Logging
    access_log /var/log/nginx/canvas-notebook-access.log;
    error_log /var/log/nginx/canvas-notebook-error.log warn;

    # Health Check Endpoint (bypass proxy)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Auth Rate Limiting (Better Auth email login/signup)
    location ~ ^/api/auth/(sign-in|sign-up)/email$ {
        limit_req zone=canvas_login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://canvas_app;
        include /etc/nginx/proxy_params.conf;
    }

    # API Rate Limiting
    location /api/ {
        limit_req zone=canvas_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://canvas_app;
        include /etc/nginx/proxy_params.conf;
    }

    # Main Application
    location / {
        proxy_pass http://canvas_app;
        include /etc/nginx/proxy_params.conf;
    }
}
