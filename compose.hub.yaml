services:
  canvas-notebook:
    image: ${CANVAS_IMAGE:-ghcr.io/canvascoding/canvas-notebook:latest}
    ports:
      - "${HOST_PORT:-3456}:${CONTAINER_PORT:-3000}"
    env_file:
      - ${CANVAS_INSTALL_DIR:-/opt/canvas-notebook}/canvas-notebook.env
    environment:
      HOSTNAME: "0.0.0.0"
      DATA: "/data"
    volumes:
      - ${DATA_DIR:-./data}:/data
    restart: unless-stopped