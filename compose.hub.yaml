services:
  canvas-notebook:
    image: ghcr.io/canvascoding/canvas-notebook:latest
    ports:
      - "3456:3000"
    environment:
      # Required: random 32-byte base64 secrets — generate with: openssl rand -base64 32
      BETTER_AUTH_SECRET: "change-me-generate-with-openssl-rand-base64-32"
      CANVAS_INTERNAL_API_KEY: "change-me-generate-with-openssl-rand-base64-32"

      # Required: the URL where the app will be accessible
      BASE_URL: "https://your-domain.com"
      BETTER_AUTH_BASE_URL: "https://your-domain.com"

      # Recommended: your login credentials
      BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
      BOOTSTRAP_ADMIN_PASSWORD: "change-me"
      BOOTSTRAP_ADMIN_NAME: "Administrator"

      # Do not change
      HOSTNAME: "0.0.0.0"
      DATA: "/data"
    volumes:
      - ./data:/data
    restart: unless-stopped
