services:
  canvas-notebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: canvas-notebook:local
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      HOSTNAME: 0.0.0.0
      WORKSPACE_DIR: /data/workspace
      SQLITE_PATH: /data/sqlite.db
      ALLOW_SIGNUP: "false"
      AI_CLI_AUTO_INSTALL: "true"
      OLLAMA_CLI_AUTO_INSTALL: "true"
      OLLAMA_MODELS: /ollama/models
    volumes:
      - ./data:/data
      - canvas_notebook_home:/home/node
      - canvas_notebook_ollama:/ollama
    restart: unless-stopped

volumes:
  canvas_notebook_home:
  canvas_notebook_ollama:
