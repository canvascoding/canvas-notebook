services:
  canvas-notebook:
    build: .
    ports:
      - "3456:3000"
    env_file:
      - .env.docker.local
    environment:
      HOSTNAME: 0.0.0.0
      DATA: /data
      ALLOW_SIGNUP: "false"
      AI_CLI_AUTO_INSTALL: "true"
      OLLAMA_CLI_AUTO_INSTALL: "true"
      NODE_OPTIONS: "--max-old-space-size=1536"
    volumes:
      - ./data:/data
      - canvas_notebook_home:/home/node
    restart: unless-stopped

volumes:
  canvas_notebook_home:
