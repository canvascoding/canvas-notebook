<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:;"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canvas Notebook</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fa;
        --panel: #ffffff;
        --text: #17202e;
        --muted: #647084;
        --line: #d8dee8;
        --accent: #1267d8;
        --accent-hover: #0f57b6;
        --danger: #b42318;
        --success: #067647;
        --warning: #9a6700;
        --shadow: 0 18px 60px rgba(15, 23, 42, 0.14);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #10141b;
          --panel: #181e27;
          --text: #eef3fb;
          --muted: #98a4b7;
          --line: #303948;
          --accent: #5c9dff;
          --accent-hover: #7db1ff;
          --danger: #ff8a80;
          --success: #69d7a3;
          --warning: #f3c76d;
          --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 720px;
        min-height: 560px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(18, 103, 216, 0.08), transparent 34%),
          var(--bg);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 48px;
      }

      .panel {
        width: min(560px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .panel-header {
        padding: 28px 32px 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 680;
        letter-spacing: 0;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      form {
        padding: 20px 32px 30px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 650;
      }

      .input-row {
        display: flex;
        gap: 10px;
      }

      input {
        width: 100%;
        min-width: 0;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 12px;
        color: var(--text);
        background: transparent;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
      }

      button {
        height: 42px;
        flex: 0 0 auto;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        color: white;
        background: var(--accent);
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:disabled {
        cursor: default;
        opacity: 0.65;
      }

      .status {
        min-height: 22px;
        margin-top: 14px;
        font-size: 13px;
        line-height: 1.45;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .status.warning {
        color: var(--warning);
      }

      .footer {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-top: 1px solid var(--line);
        padding: 14px 32px;
        color: var(--muted);
        font-size: 12px;
      }

      code {
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="title">
        <div class="panel-header">
          <h1 id="title">Connect Canvas Notebook</h1>
          <p>Enter the URL of the Canvas Notebook server this desktop app should open.</p>
        </div>

        <form id="connection-form">
          <label for="server-url">Server URL</label>
          <div class="input-row">
            <input
              id="server-url"
              name="server-url"
              type="url"
              inputmode="url"
              autocomplete="url"
              spellcheck="false"
              placeholder="https://notebook.example.com"
              required
            >
            <button id="connect-button" type="submit">Connect</button>
          </div>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </form>

        <div class="footer">
          <span id="app-version">Canvas Notebook</span>
          <span>Local development: <code>http://localhost:3000</code></span>
        </div>
      </section>
    </main>

    <script>
      const form = document.querySelector('#connection-form');
      const input = document.querySelector('#server-url');
      const button = document.querySelector('#connect-button');
      const status = document.querySelector('#status');
      const appVersion = document.querySelector('#app-version');

      function setStatus(message, type = '') {
        status.textContent = message;
        status.className = `status ${type}`.trim();
      }

      function setBusy(busy) {
        button.disabled = busy;
        input.disabled = busy;
        button.textContent = busy ? 'Connecting...' : 'Connect';
      }

      async function boot() {
        if (!window.canvasDesktop) {
          setStatus('Desktop bridge is not available.', 'error');
          return;
        }

        const info = await window.canvasDesktop.getAppInfo();
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');

        appVersion.textContent = `${info.appName} ${info.version}`;

        if (info.serverUrl) {
          input.value = info.serverUrl;
        }

        if (error) {
          setStatus(error, 'error');
        }
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();
        const value = input.value.trim();

        setBusy(true);
        setStatus('Checking server...');

        try {
          const result = await window.canvasDesktop.setServerUrl(value);

          if (!result.ok) {
            setStatus(result.message || 'Could not connect to this server.', 'error');
            return;
          }

          const warning = result.warning ? `${result.warning} ` : '';
          setStatus(`${warning}Connected. Opening server...`, result.warning ? 'warning' : 'success');
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'Connection failed.', 'error');
        } finally {
          setBusy(false);
        }
      });

      boot().catch(error => {
        setStatus(error instanceof Error ? error.message : 'Setup failed.', 'error');
      });
    </script>
  </body>
</html>
