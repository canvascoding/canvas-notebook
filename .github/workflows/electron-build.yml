name: Electron Desktop Build

on:
  push:
    tags:
      - "v*"
  schedule:
    # Weekly desktop builds on Wednesdays at 03:00 UTC.
    - cron: "0 3 * * 3"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: electron-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron desktop artifacts
        run: npm run electron:dist

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: canvas-notebook-desktop-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 30
          path: |
            dist-electron/*.AppImage
            dist-electron/*.blockmap
            dist-electron/*.deb
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/*.rpm
            dist-electron/*.zip
            dist-electron/latest*.yml

      - name: Upload desktop artifacts to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(
            dist-electron/*.AppImage
            dist-electron/*.blockmap
            dist-electron/*.deb
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/*.rpm
            dist-electron/*.zip
            dist-electron/latest*.yml
          )

          if (( ${#files[@]} == 0 )); then
            echo "No desktop artifacts found for release upload."
            exit 1
          fi

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --title "$GITHUB_REF_NAME" \
              --notes "Desktop artifacts for $GITHUB_REF_NAME."
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
